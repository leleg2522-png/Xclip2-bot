openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: invite
    description: Picsart team invite automation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /invite-jobs:
    get:
      operationId: listInviteJobs
      tags: [invite]
      summary: List all invite jobs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InviteJob"
    post:
      operationId: createInviteJobs
      tags: [invite]
      summary: Add one or more emails to invite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteJobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InviteJob"

  /invite-jobs/run-all:
    post:
      operationId: runAllInviteJobs
      tags: [invite]
      summary: Run all pending invite jobs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAllResult"

  /invite-jobs/{id}:
    delete:
      operationId: deleteInviteJob
      tags: [invite]
      summary: Delete an invite job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invite-jobs/{id}/run:
    post:
      operationId: runInviteJob
      tags: [invite]
      summary: Run a specific invite job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteJob"

  /picsart-slots:
    get:
      operationId: getPicsartSlots
      tags: [invite]
      summary: Get remaining Picsart team slots
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicsartSlots"

  /settings/db:
    get:
      operationId: getDbSettings
      tags: [invite]
      summary: Get the configured Railway target DB status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSettings"
    put:
      operationId: updateDbSettings
      tags: [invite]
      summary: Set (or clear) the Railway target DB connection string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DbSettingsInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSettingsResult"
        "400":
          description: Invalid or unreachable connection string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSettingsResult"

  /settings/proxy:
    get:
      operationId: getProxySettings
      tags: [invite]
      summary: Get the configured residential proxy country
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxySettings"
    put:
      operationId: updateProxySettings
      tags: [invite]
      summary: Set the residential proxy country used for browser tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxySettingsInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxySettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    InviteJob:
      type: object
      required: [id, email, status, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        status:
          type: string
          enum: [pending, inviting, invited, accepting, accepted, extracting, in_pool, failed]
        errorMessage:
          type: ["string", "null"]
        credentialId:
          type: ["integer", "null"]
        invitedAt:
          type: ["string", "null"]
        acceptedAt:
          type: ["string", "null"]
        pooledAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    InviteJobInput:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            type: object
            required: [email, gmailPassword]
            properties:
              email:
                type: string
              gmailPassword:
                type: string

    RunAllResult:
      type: object
      required: [queued]
      properties:
        queued:
          type: integer

    PicsartSlots:
      type: object
      required: [available, total]
      properties:
        available:
          type: integer
        total:
          type: integer
        members:
          type: integer

    DbSettings:
      type: object
      required: [configured, source]
      properties:
        configured:
          type: boolean
        urlMasked:
          type: ["string", "null"]
        source:
          type: string
          enum: [panel, env, none]

    DbSettingsInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Railway Postgres connection string. Empty string clears the panel override.

    DbSettingsResult:
      type: object
      required: [ok, configured, source]
      properties:
        ok:
          type: boolean
        error:
          type: ["string", "null"]
        configured:
          type: boolean
        urlMasked:
          type: ["string", "null"]
        source:
          type: string
          enum: [panel, env, none]

    ProxySettings:
      type: object
      required: [country]
      properties:
        country:
          type: string
          description: Two-letter residential proxy country code (e.g. id, us, gb, sg).

    ProxySettingsInput:
      type: object
      required: [country]
      properties:
        country:
          type: string
          pattern: "^[A-Za-z]{2}$"
          description: Two-letter residential proxy country code to route browser tasks through.
