kind = "web"
previewPath = "/"
title = "Picsart Media Downloader"
version = "1.0.0"
id = "artifacts/picsart-scraper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24685

[services.development]
run = "pnpm --filter @workspace/picsart-scraper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/picsart-scraper", "run", "build" ]
publicDir = "artifacts/picsart-scraper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24685"
BASE_PATH = "/"
